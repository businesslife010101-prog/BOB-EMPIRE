<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Royal Gift Gallery</title>

<style>

body{
font-family: Arial;
margin:0;
background:#fafafa;
}

/* HEADER */

header{
background:#8b0000;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
height:400px;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)), url("shop.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
text-align:center;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:40px;
justify-content:center;
}

.card{
width:220px;
border:1px solid #ddd;
padding:10px;
background:white;
text-align:center;
border-radius:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#8b0000;
font-weight:bold;
}

button{
background:#8b0000;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

/* CONTACT */

.contact{
background:#eee;
padding:40px;
text-align:center;
}

.mapbtn{
background:#0a66c2;
}

</style>
</head>

<body>

<header>

<h1>Royal Gift Gallery</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

</header>


<div class="hero">
Premium Gifts For Every Occasion
</div>


<section class="products">

<div class="card">
<img src="gift1.jpg">
<h3>Teddy Bear</h3>
<p class="price">₹499</p>
<button>Contact for details</button>
</div>

<div class="card">
<img src="gift2.jpg">
<h3>Photo Frame</h3>
<p class="price">₹299</p>
<button>Contact for details</button>
</div>

<div class="card">
<img src="gift3.jpg">
<h3>Couple Mug</h3>
<p class="price">₹399</p>
<button>Contact for details</button>
</div>

</section>


<section class="contact">

<h2>Visit Our Store</h2>

<p>
Near Panchmukhi Hanuman Mandir,<br>
West Boring Canal Rd,<br>
Opposite SBI Bank,<br>
Bihar 800001
</p>

<br>

<a href="https://maps.app.goo.gl/epaNSwdG6mqGMWva8">
<button class="mapbtn">Open Location</button>
</a>

</section>

</body>
</html>
